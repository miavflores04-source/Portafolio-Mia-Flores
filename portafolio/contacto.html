  <!-- ═══ CONTACTO ═══ -->
  <section id="contacto">
    <div class="container">
 
      <div class="text-center" id="contacto-header">
        <h2 id="contacto-titulo">Contacto</h2>
        <p id="contacto-subtitulo">Trabajemos en tu próximo proyecto.</p>
      </div>
 
      <div class="row justify-content-center">
        <div class="col-lg-6 col-sm-10 col-12">
          <form id="contacto-form">
 
            <div class="mb-3">
              <label for="contacto-nombre" class="form-label">Nombre completo</label>
              <input type="text" class="form-control" id="contacto-nombre" placeholder="Tu nombre">
            </div>
 
            <div class="mb-3">
              <label for="contacto-email" class="form-label">Correo electrónico</label>
              <input type="email" class="form-control" id="contacto-email" placeholder="tucorreo@email.com">
            </div>
 
            <div class="mb-3">
              <label for="contacto-mensaje" class="form-label">Mensaje</label>
              <textarea class="form-control" id="contacto-mensaje" rows="5" placeholder="Contame sobre tu proyecto..."></textarea>
            </div>
 
            <div class="text-center">
              <button type="button" class="btn" id="contacto-btn">Enviar mensaje</button>
            </div>
 
          </form>
        </div>
      </div>
 
    </div>
  </section>
